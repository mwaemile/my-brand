<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In</title>

<link rel="stylesheet" href="../styles/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-container">

    <div class="left">

        <h1>Welcome Back</h1>

        <p>
            Sign in to access your account, manage your profile,
            and explore my latest projects and services.
        </p>

        <img src="../imgs/logo1.jpg" alt="Logo">

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Sign In</h2>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input
                type="password"
                id="password"
                placeholder="Password"
                required>
            </div>

            <div class="options">

    <label>
        <input type="checkbox">
        Remember Me
    </label>

</div>

<button type="submit">
    Sign In
</button>

<!-- Hidden error message -->
<p id="loginError" class="error-message"></p>

<!-- Hidden Forgot Password link -->
<p id="forgotPassword" class="forgot-password">
    <a href="forgot-password.html">Forgot Password?</a>
</p>

<p class="signup-link">
    Don't have an account?
    <a href="signup.html">Create Account</a>
</p>

        </form>

    </div>

</div>

<script src="../script/login.js"></script>

</body>
</html>
