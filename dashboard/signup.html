<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<link rel="stylesheet" href="../styles/signup.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="signup-container">

<div class="left">

<h1>Create Account</h1>

<p>
Join my portfolio community to receive updates,
save your information and contact me easily.
</p>

<img src="../imgs/logo1.jpg" alt="Logo">

</div>

<div class="right">

<form id="signupForm">

<h2>Sign Up</h2>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input
type="text"
id="fullname"
placeholder="Full Name"
required>
</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input
type="email"
id="email"
placeholder="Email Address"
required>
</div>

<div class="input-box">
<i class="fa-solid fa-phone"></i>
<input
type="tel"
id="phone"
placeholder="Phone Number"
required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input
type="password"
id="password"
placeholder="Password"
required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>
</div>

<button type="submit">
Create Account
</button>

<p class="login-link">
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>

</div>

<script src="../script/signup.js"></script>

</body>
</html>
